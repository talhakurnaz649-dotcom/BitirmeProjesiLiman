<html lang="tr">
<head>

        tailwind.config = {
            theme: {
                extend: {
                    colors: {

                            bg: '#0b0f19',
                            card: '#111827',
                            border: '#1e293b'
                        }
                    }
                }
            }
        }
    </script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin="anonymous" onerror="document.getElementById('error-message-detail').textContent += '\nReact yüklenemedi. İnternet bağlantınızı kontrol edin.'; document.getElementById('fallback-error-console').style.display = 'block';"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin="anonymous" onerror="document.getElementById('error-message-detail').textContent += '\nReactDOM yüklenemedi. İnternet bağlantınızı kontrol edin.'; document.getElementById('fallback-error-console').style.display = 'block';"></script>

    <!-- Marked.js CDN -->

    <!-- Google Fonts Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0f19;
            color: #f8fafc;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0b0f19;
        }

        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 3px;
        }

        .glow-blue {
            animation: pulse-glow 3s infinite;
        }

        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
            }

            50% {
                box-shadow: 0 0 25px rgba(59, 130, 246, 0.4);
            }
        }

        .chat-markdown p {
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }

            .chat-markdown p:last-child {
                margin-bottom: 0;
            }

        .chat-markdown ul {
            list-style-type: disc;
            margin-left: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .chat-markdown li {
            margin-bottom: 0.25rem;
        }

        .chat-markdown strong {
            font-weight: 700;
            color: #ffffff;
        }

        /* Slayt Animasyonlu Toast Bildirimleri */
        @keyframes slide-down {
            0% {
                transform: translate(-50%, -100px) scale(0.9);
                opacity: 0;
            }

            100% {
                transform: translate(-50%, 0) scale(1);
                opacity: 1;
            }
        }

        .toast-animate {
            animation: slide-down 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Yazdırma Modu Tasarımı (Sadece Faturanın basılması için) */
        @media print {
            body * {
                visibility: hidden;
            }

            #printable-invoice-area, #printable-invoice-area *,
            #printable-gate-pass, #printable-gate-pass *,
            #printable-label-area, #printable-label-area * {
                visibility: visible;
            }

            #printable-invoice-area, #printable-gate-pass, #printable-label-area {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                background: white !important;
                color: black !important;
            }
        }

        /* Arama Kutusu Yanıp Sönme Animasyonu */
        @keyframes pulse-border-glow {
            0%, 100% {
                border-color: rgba(71, 85, 105, 0.6);
                box-shadow: 0 0 0px rgba(245, 158, 11, 0);
            }

            50% {
                border-color: rgba(245, 158, 11, 0.8);
                box-shadow: 0 0 15px rgba(245, 158, 11, 0.5);
            }
        }

        .pulse-border {
            animation: pulse-border-glow 2s infinite;
        }

        /* Harita Konteyner Yanıp Sönme Animasyonu */
        @keyframes search-flash-glow {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 5px rgba(245, 158, 11, 0.4);
                border-color: rgba(245, 158, 11, 0.5);
            }

            50% {
                transform: scale(1.04);
                box-shadow: 0 0 25px rgba(245, 158, 11, 0.9);
                border-color: rgba(245, 158, 11, 1);
            }
        }

        .animate-search-glow {
            animation: search-flash-glow 1.2s infinite ease-in-out;
            z-index: 10;
        }

        /* 3D Kuşbakışı Liman Animasyonları */
        @keyframes ship-bob {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(2px) rotate(0.1deg);
            }
        }

        .animate-ship-bob {
            animation: ship-bob 6s infinite ease-in-out;
            transform-origin: center;
        }

        @keyframes crane-trolley {
            0%, 100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(15px, 7px);
            }
        }

        .animate-crane-trolley {
            animation: crane-trolley 5s infinite ease-in-out;
        }

        @keyframes wave-ripple {
            0% {
                stroke-dashoffset: 0;
            }

            100% {
                stroke-dashoffset: -20;
            }
        }

        .animate-wave-ripple {
            stroke-dasharray: 5, 10;
            animation: wave-ripple 4s infinite linear;
        }

        @keyframes cloud-slide {
            0% {
                transform: translateX(-100px);
                opacity: 0;
            }

            10% {
                opacity: 0.25;
            }

            90% {
                opacity: 0.25;
            }

            100% {
                transform: translateX(800px);
                opacity: 0;
            }
        }

        .animate-cloud-1 {
            animation: cloud-slide 50s infinite linear;
        }

        .animate-cloud-2 {
            animation: cloud-slide 75s infinite linear;
            animation-delay: -25s;
        }
    </style>
</head>
<body class="bg-dark-bg text-slate-100 overflow-hidden w-full h-screen">

    <div id="fallback-error-console" style="display:none; padding: 20px; background: #800000; color: white; font-family: monospace; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 99999; overflow: auto; box-sizing: border-box;">
        <h2 style="font-size: 20px; margin-bottom: 10px; color: #ff5555;">🚨 JavaScript Hata Yakalayıcı (Liman Arayüzü)</h2>
        <p style="margin-bottom: 15px;">Arayüz yüklenirken veya derlenirken bir hata oluştu. Tarayıcı internet bağlantısını kesmiş veya CDN sunucularına erişemiyor olabilir. Hata detayları aşağıdadır:</p>
        <pre id="error-message-detail" style="background: rgba(0,0,0,0.6); padding: 15px; border-radius: 8px; border: 1px solid #ff3333; font-size: 13px; white-space: pre-wrap; word-break: break-all;"></pre>
        <button onclick="window.location.reload();" style="margin-top: 15px; padding: 10px 20px; background: #0066cc; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Yeniden Yükle</button>
    </div>
    <script>
        window.addEventListener('error', function(e) {
            document.getElementById('fallback-error-console').style.display = 'block';
            var detail = document.getElementById('error-message-detail');
            var errInfo = e.message + '\nDosya: ' + e.filename + '\nSatır: ' + e.lineno + ' Kolon: ' + e.colno;
            if (e.error && e.error.stack) {
                errInfo += '\n\nStack Trace:\n' + e.error.stack;
            }
            detail.textContent = errInfo;
        });
        window.addEventListener('unhandledrejection', function(e) {
            document.getElementById('fallback-error-console').style.display = 'block';
            var detail = document.getElementById('error-message-detail');
            detail.textContent = 'Unhandled Promise Rejection:\nReason: ' + e.reason;
        });
    </script>

    <div id="root" class="w-full h-full"></div>

        // 2. ERROR BOUNDARY
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null, errorInfo: null };
            }
            componentDidCatch(error, errorInfo) {
                this.setState({ hasError: true, error: error, errorInfo: errorInfo });
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="p-8 bg-red-955 text-red-200 font-mono h-screen overflow-auto space-y-4">
                            <h2 className="text-xl font-bold text-red-400">⚠️ Liman Yönetim Paneli Hata Yakaladı</h2>
                            <p className="text-sm">React bileşen ağacında bir çalışma zamanı hatası oluştu:</p>
                            <pre className="bg-red-900/40 p-4 rounded-xl border border-red-800 text-xs whitespace-pre-wrap">
                                {this.state.error && this.state.error.toString()}
                            </pre>
                            <h3 className="text-md font-bold text-red-300">Hata Yığını (Stack Trace):</h3>
                            <pre className="bg-red-900/20 p-4 rounded-xl border border-red-900/40 text-[10px] whitespace-pre-wrap">
                                {this.state.errorInfo && this.state.errorInfo.componentStack}
                            </pre>

                            <div className="pt-4 flex gap-4">
                                <button
                                    onClick={() => { window.location.reload(); }}
                                    className="px-6 py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl transition duration-200 text-xs"
                                >
                                    Sayfayı Yeniden Yükle ve Tekrar Dene
                                </button>
                                <button
                                    onClick={() => { if (window.confirm("TÜM VERİLERİNİZ SİLİNECEKTİR! Girdiğiniz gemi, kullanıcı ve konteyner verilerini kaybetmek istediğinize emin misiniz?")) { localStorage.clear(); window.location.reload(); } }}
                                    className="px-6 py-3 bg-red-750 hover:bg-red-600 text-slate-200 font-bold rounded-xl transition duration-200 text-xs border border-red-700/30"
                                >
                                    Tüm Verileri Sıfırla (Hard Reset)
                                </button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // 3. INTERACTIVE YARD MAP
        function InteractiveYardMap({ containers, movements = [], highlightSearch, onSelectContainer }) {
            const [viewMode, setViewMode] = React.useState('3d'); // '3d' veya 'grid'
            const blocks = ['A', 'B', 'C', 'D'];
            const bays = [1, 2, 3, 4, 5, 6];

            const getContainer = (block, bay) => {
                return containers.find(c => c.block === block && c.bay === bay);
            };

            const getIsoCoords = (block, bay) => {
                const blockOffsets = {
                    'A': { x: 100, y: 190 },
                    'B': { x: 440, y: 190 },
                    'C': { x: 100, y: 300 },
                    'D': { x: 440, y: 300 }
                };

                const base = blockOffsets[block];
                const bayX = (bay - 1) * 32;
                const bayY = (bay - 1) * 16;

                return {
                    x: base.x + bayX,
                    y: base.y + bayY
                };
            };

            const shipAtBerth1 = movements.find(s => s.status === 'Yanaştı' && s.berthNo === 'Rıhtım 1');
            const shipAtBerth2 = movements.find(s => s.status === 'Yanaştı' && s.berthNo === 'Rıhtım 2');

            return (
                <div className="space-y-4">
                    {/* View mode toggle */}
                    <div className="flex justify-end space-x-2">
                        <button
                            onClick={() => setViewMode('3d')}
                            className={`px-3 py-1.5 rounded-xl text-[10px] font-bold tracking-wider transition ${viewMode === '3d' ? 'bg-amber-600 text-white shadow' : 'bg-slate-900 border border-slate-800 text-slate-400 hover:text-white'}`}
                        >
                            KUŞBAKIŞI 3D HARİTA
                        </button>
                        <button
                            onClick={() => setViewMode('grid')}
                            className={`px-3 py-1.5 rounded-xl text-[10px] font-bold tracking-wider transition ${viewMode === 'grid' ? 'bg-amber-600 text-white shadow' : 'bg-slate-900 border border-slate-800 text-slate-400 hover:text-white'}`}
                        >
                            STANDART 2D IZGARA
                        </button>
                    </div>

                    {viewMode === '3d' ? (
                        <div className="relative bg-slate-950/40 border border-slate-900 rounded-2xl p-4 overflow-x-auto flex justify-center">
                            {/* Legend */}
                            <div className="absolute top-4 left-4 bg-slate-950/80 border border-slate-900 p-2.5 rounded-xl text-[9px] text-slate-400 space-y-1.5 z-20 pointer-events-none">
                                <div className="font-extrabold uppercase text-slate-300 mb-1 border-b border-slate-900 pb-1">Renk Kodları</div>
                                <div className="flex items-center space-x-2">
                                    <span className="w-2.5 h-2.5 bg-emerald-500 rounded" />
                                    <span>Dry (Kuru Yük)</span>
                                </div>
                                <div className="flex items-center space-x-2">
                                    <span className="w-2.5 h-2.5 bg-cyan-500 rounded" />
                                    <span>Reefer (Soğutmalı)</span>
                                </div>
                                <div className="flex items-center space-x-2">
                                    <span className="w-2.5 h-2.5 bg-red-500 rounded" />
                                    <span>Hazardous (Tehlikeli)</span>
                                </div>
                                <div className="flex items-center space-x-2">
                                    <span className="w-2.5 h-1 border border-dashed border-slate-700 bg-slate-900/40 rounded" />
                                    <span>Boş Yuva</span>
                                </div>
                            </div>

                            <svg className="w-full max-w-[760px] h-[400px] text-slate-300 select-none" viewBox="0 0 760 400" fill="none">

        // 6. SHIPS PAGE (WITH LIVE STATUS & BERTH SELECTION FOR ADMIN/MODERATORS)
        function ShipsPage({ ships, setShips, containers, currentUser, addLog, showToast }) {
            const [form, setForm] = useState({ name: '', type: 'Konteyner Gemisi', arrivalDate: '', status: 'Yolda', berthNo: 'Rıhtım 1' });

            const canModify = currentUser.role === 'Admin' || currentUser.role === 'Moderator';

            const handleAdd = (e) => {
                e.preventDefault();
                if (!form.name || !form.arrivalDate) {
                    return showToast('Form Hatası', 'Lütfen gemi adı ve varış tarihi alanlarını doldurun.', 'error');
                }

                if (form.status === 'Yanaştı') {
                    const isOccupied = ships.some(s => s.status === 'Yanaştı' && s.berthNo === form.berthNo);
                    if (isOccupied) {
                        const occupiedShipName = ships.find(s => s.status === 'Yanaştı' && s.berthNo === form.berthNo)?.name;
                        return showToast('Emniyet Kısıti', `${form.berthNo} üzerinde zaten ${occupiedShipName} gemisi yanaşmış durumda!`, 'error');
                    }
                }

                const newShip = {
                    id: Date.now(),
                    name: form.name.trim(),
                    type: form.type,
                    arrivalDate: form.arrivalDate,
                    status: form.status,
                    berthNo: form.berthNo
                };

                setShips([...ships, newShip]);
                addLog(`Yeni gemi girişi kaydedildi: ${newShip.name} (${newShip.type})`);
                showToast('Başarılı', `${newShip.name} gemisi başarıyla listeye eklendi.`, 'success');
                setForm({ name: '', type: 'Konteyner Gemisi', arrivalDate: '', status: 'Yolda', berthNo: 'Rıhtım 1' });
            };

            const handleStatusChange = (id, newStatus) => {
                const targetShip = ships.find(s => s.id === id);
                if (!targetShip) return;

                if (newStatus === 'Yanaştı') {
                    const targetBerth = targetShip.berthNo || 'Rıhtım 1';
                    const isOccupied = ships.some(s => s.id !== id && s.status === 'Yanaştı' && s.berthNo === targetBerth);
                    if (isOccupied) {
                        const occupiedShipName = ships.find(s => s.id !== id && s.status === 'Yanaştı' && s.berthNo === targetBerth)?.name;
                        return showToast('Emniyet Kısıtı', `${targetBerth} üzerinde zaten ${occupiedShipName} gemisi yanaşmış durumda! Aynı rıhtıma iki gemi yanaşamaz.`, 'error');
                    }
                }

                setShips(prev => prev.map(s => {
                    if (s.id === id) {
                        addLog(`Gemi durumu güncellendi: ${s.name} -> ${newStatus}`);
                        showToast('Durum Güncellendi', `${s.name} durumu '${newStatus}' yapıldı.`, 'success');
                        return { ...s, status: newStatus };
                    }
                    return s;
                }));
            };

            const handleBerthChange = (id, newBerth) => {
                const targetShip = ships.find(s => s.id === id);
                if (!targetShip) return;

                if (targetShip.status === 'Yanaştı') {
                    const isOccupied = ships.some(s => s.id !== id && s.status === 'Yanaştı' && s.berthNo === newBerth);
                    if (isOccupied) {
                        const occupiedShipName = ships.find(s => s.id !== id && s.status === 'Yanaştı' && s.berthNo === newBerth)?.name;
                        return showToast('Emniyet Kısıtı', `${newBerth} üzerinde zaten ${occupiedShipName} gemisi yanaşmış durumda! Aynı rıhtıma iki gemi yanaşamaz.`, 'error');
                    }
                }

                setShips(prev => prev.map(s => {
                    if (s.id === id) {
                        addLog(`Gemi rıhtım ataması değişti: ${s.name} -> ${newBerth}`);
                        showToast('Rıhtım Değiştirildi', `${s.name} gemisi ${newBerth} konumuna atandı.`, 'success');
                        return { ...s, berthNo: newBerth };
                    }
                    return s;
                }));
            };

            const handleDelete = (id) => {
                if (!canModify) return showToast('Yetki Sınırı', 'Gemi kaydı silme yetkisine sadece yöneticiler sahiptir.', 'error');

                const linkedCount = containers.filter(c => c.shipId === id).length;
                if (linkedCount > 0) {
                    return showToast('Emniyet Engeli', `Bu gemiye kayıtlı sahada ${linkedCount} adet konteyner bulunuyor. Önce konteynerleri sahadan kaldırın.`, 'warning');
                }

                const targetShip = ships.find(s => s.id === id);
                if (window.confirm('Gemi kaydını silmek istediğinize emin misiniz?')) {
                    setShips(ships.filter(s => s.id !== id));
                    if (targetShip) {
                        addLog(`Gemi kaydı silindi: ${targetShip.name}`);
                        showToast('Silindi', `${targetShip.name} gemi kaydı sistemden kaldırıldı.`, 'success');
                    }
                }
            };

            return (
                <div className="space-y-6">
                    <div>
                        <h1 className="text-3xl font-extrabold text-white">Gemi Giriş & Kayıt Yönetimi</h1>
                        <p className="text-slate-400 text-sm mt-1">Limana yanaşacak olan gemilerin kayıtlarını oluşturun.</p>
                    </div>

                    <div className="grid grid-cols-1 xl:grid-cols-3 gap-6">
                        <div className="bg-[#111827] border border-slate-800 p-6 rounded-2xl h-fit">
                            <h2 className="text-lg font-bold text-white mb-4">Yeni Gemi Giriş Kaydı</h2>
                            <form onSubmit={handleAdd} className="space-y-4">
                                <div>
                                    <label className="text-xs text-slate-400 block mb-1">Gemi Adı</label>
                                    <input type="text" placeholder="Örn: MSC Valeria" className="w-full bg-[#1e293b]/40 border border-slate-700 rounded-xl px-4 py-2.5 text-slate-205 text-sm focus:outline-none" value={form.name} onChange={e => setForm({...form, name: e.target.value})} />
                                </div>
                                <div>
                                    <label className="text-xs text-slate-400 block mb-1">Gemi Tipi</label>
                                    <select className="w-full bg-[#1e293b]/40 border border-slate-700 rounded-xl px-3 py-2.5 text-slate-205 text-xs focus:outline-none text-slate-100 font-semibold" value={form.type} onChange={e => setForm({...form, type: e.target.value})}>
                                        <option value="Konteyner Gemisi">Konteyner Gemisi</option>
                                        <option value="Kargo Gemisi">Kargo Gemisi</option>
                                        <option value="Tanker">Tanker</option>
                                        <option value="Dökme Yük Gemisi">Dökme Yük Gemisi</option>
                                    </select>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="text-xs text-slate-400 block mb-1">Yanaşma Rıhtımı</label>
                                        <select className="w-full bg-[#1e293b]/40 border border-slate-700 rounded-xl px-3 py-2.5 text-slate-205 text-xs focus:outline-none text-slate-100 font-semibold" value={form.berthNo} onChange={e => setForm({...form, berthNo: e.target.value})}>
                                            <option value="Rıhtım 1">Rıhtım 1 (Berth 1)</option>
                                            <option value="Rıhtım 2">Rıhtım 2 (Berth 2)</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="text-xs text-slate-400 block mb-1">Varış Durumu</label>
                                        <select className="w-full bg-[#1e293b]/40 border border-slate-700 rounded-xl px-3 py-2.5 text-slate-205 text-xs focus:outline-none text-slate-100 font-semibold" value={form.status} onChange={e => setForm({...form, status: e.target.value})}>
                                            <option value="Yolda">Yolda</option>
                                            <option value="Beklemede">Beklemede (Demirde)</option>
                                            <option value="Yanaştı">Yanaştı (Rıhtımda)</option>
                                        </select>
                                    </div>
                                </div>
                                <div>
                                    <label className="text-xs text-slate-400 block mb-1">Varış Tarihi</label>
                                    <input type="datetime-local" min="2026-01-01T00:00" max="2030-12-31T23:59" className="w-full bg-[#1e293b]/40 border border-slate-700 rounded-xl px-2 py-2 text-slate-200 text-xs focus:outline-none text-slate-100 font-semibold" value={form.arrivalDate} onChange={e => setForm({...form, arrivalDate: e.target.value})} />
                                </div>
                                <button type="submit" className="w-full mt-4 bg-blue-600 hover:bg-blue-500 text-white font-bold py-2.5 rounded-xl transition duration-200 shadow-lg">Gemi Kaydını Tamamla</button>
                            </form>
                        </div>

                        <div className="xl:col-span-2 bg-[#111827] border border-slate-800 p-6 rounded-2xl">
                            <h2 className="text-lg font-bold text-white mb-6">Limandaki Gemi Listesi</h2>
                            <div className="overflow-x-auto">
                                <table className="w-full text-left text-xs text-slate-400">
                                    <thead className="bg-[#1e293b]/30 text-slate-300 uppercase">
                                        <tr>
                                            <th className="px-6 py-4 rounded-l-xl">Gemi Adı</th>
                                            <th className="px-6 py-4">Tipi / Rıhtım</th>
                                            <th className="px-6 py-4">Varış Tarihi</th>
                                            <th className="px-6 py-4">Sahadaki Konteynerleri</th>
                                            <th className="px-6 py-4">Durum</th>
                                            <th className="px-6 py-4 rounded-r-xl text-center">İşlem</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-800/60">
                                        {ships.map(s => {
                                            const cargoCount = containers.filter(c => c.shipId === s.id).length;
                                            return (
                                                <tr key={s.id} className="hover:bg-slate-800/20">
                                                    <td className="px-6 py-4 font-bold text-slate-200">{s.name}</td>
                                                    <td className="px-6 py-4">
                                                        <div className="flex flex-col space-y-1">
                                                            <span className="text-slate-205 font-medium">{s.type}</span>
                                                            {canModify ? (
                                                                <select
                                                                    className="bg-slate-900 border border-slate-755 text-[10px] rounded px-1.5 py-0.5 text-slate-400 focus:outline-none w-24 font-bold text-slate-300"
                                                                    value={s.berthNo || 'Rıhtım 1'}
                                                                    onChange={(e) => handleBerthChange(s.id, e.target.value)}
                                                                >
                                                                    <option value="Rıhtım 1">Rıhtım 1</option>
                                                                    <option value="Rıhtım 2">Rıhtım 2</option>
                                                                </select>
                                                            ) : (
                                                                <span className="text-[10px] text-slate-500">({s.berthNo || 'Atanmadı'})</span>
                                                            )}
                                                        </div>
                                                    </td>
                                                    <td className="px-6 py-4">{new Date(s.arrivalDate).toLocaleString('tr-TR')}</td>
                                                    <td className="px-6 py-4 font-bold text-blue-400">{cargoCount} adet</td>
                                                    <td className="px-6 py-4">
                                                        {canModify ? (
                                                            <select
                                                                className={`bg-slate-900 border border-slate-755 text-[10px] rounded px-2 py-1 font-bold ${s.status === 'Yanaştı' ? 'text-emerald-400' : s.status === 'Beklemede' ? 'text-amber-400' : 'text-blue-400'}`}
                                                                value={s.status}
                                                                onChange={(e) => handleStatusChange(s.id, e.target.value)}
                                                            >
                                                                <option value="Yolda" className="text-blue-400 font-semibold">Yolda</option>
                                                                <option value="Beklemede" className="text-amber-400 font-semibold">Beklemede</option>
                                                                <option value="Yanaştı" className="text-emerald-400 font-semibold">Yanaştı</option>
                                                            </select>
                                                        ) : (
                                                            <span className={`px-2 py-0.5 rounded text-[10px] font-bold ${s.status === 'Yanaştı' ? 'bg-emerald-500/10 text-emerald-400' : s.status === 'Beklemede' ? 'bg-amber-500/10 text-amber-400' : 'bg-blue-500/10 text-blue-400'}`}>{s.status}</span>
                                                        )}
                                                    </td>
                                                    <td className="px-6 py-4 text-center">
                                                        <button onClick={() => handleDelete(s.id)} className={`text-slate-500 hover:text-red-400 ${!canModify ? 'opacity-30 cursor-not-allowed' : ''}`} disabled={!canModify}><Icons.Trash /></button>

                                            );

        // 7. CONTAINERS PAGE
        function ContainersPage({ containers, setContainers, inspections, setInspections, ships, currentUser, isStormActive, addLog, showToast }) {
            const [form, setForm] = useState({ containerNumber: '', size: '20ft', cargoType: 'Dry', block: 'A', bay: 1, row: 1, tier: 1, shipId: '' });
            const [search, setSearch] = useState('');

            const canDelete = currentUser.role === 'Admin' || currentUser.role === 'Moderator';

            const blockCounts = {
                A: containers.filter(c => c.block === 'A').length,
                B: containers.filter(c => c.block === 'B').length,
                C: containers.filter(c => c.block === 'C').length,
                D: containers.filter(c => c.block === 'D').length
            };
            const highDensityBlocks = Object.keys(blockCounts).filter(k => blockCounts[k] >= 5);

            const handleAdd = (e) => {
                e.preventDefault();
                if (isStormActive) {
                    return showToast('Emniyet Kısıtlaması', 'Fırtına nedeniyle vinç operasyonları tamamen kilitlidir. Yük eklenemez.', 'error');
                }
                if (!form.containerNumber) return showToast('Form Hatası', 'Lütfen geçerli bir konteyner numarası girin.', 'error');
                if (!form.shipId) return showToast('Form Hatası', 'Lütfen konteynerin geldiği gemiyi seçin.', 'error');

                const occupied = containers.some(c => c.block === form.block && c.bay === form.bay);
                if (occupied) return showToast('Konum Dolu', `Seçilen ${form.block}-${form.bay} hücresinde başka bir yük bulunmaktadır.`, 'error');

                if (form.cargoType === 'Hazardous') {
                    const blockHazardous = containers.filter(c => c.block === form.block && c.cargoType === 'Hazardous');
                    for (let existing of blockHazardous) {
                        const distance = Math.abs(existing.bay - form.bay);
                        if (distance < 3) {
                            return showToast(
                                '⚠️ GÜVENLİK ENGELİ',
                                `Tehlikeli maddeler arasında en az 3 bay boşluk olmalıdır! En yakın tehlikeli yük: Hücre ${existing.bay} (Mesafe: ${distance})`,
                                'warning'
                            );
                        }
                    }
                }

                const newId = Date.now();
                const cleanNumber = form.containerNumber.trim().toUpperCase();
                setContainers([...containers, { id: newId, ...form, containerNumber: cleanNumber, shipId: parseInt(form.shipId) }]);

                // Gümrük denetimine otomatik olarak "Beklemede" durumunda ekle:
                const newInspection = {
                    id: Date.now() + 1,
                    containerNumber: cleanNumber,
                    inspectorName: 'Atanmadı',
                    date: new Date().toISOString().split('T')[0],
                    status: 'Beklemede',
                    notes: 'Yeni eklenen yük. Gümrük muayenesi bekleniyor.'
                };
                setInspections([...inspections, newInspection]);

                addLog(`Yeni Konteyner sahaya yerleştirildi ve gümrük kaydı açıldı: ${cleanNumber} (Konum: Blok ${form.block}-${form.bay})`);
                showToast('Yerleştirildi', `${cleanNumber} sahaya başarıyla kaydedildi ve gümrük denetimine alındı.`, 'success');
                setForm({ containerNumber: '', size: '20ft', cargoType: 'Dry', block: 'A', bay: 1, row: 1, tier: 1, shipId: '' });
            };

            const handleDelete = (id) => {
                if (isStormActive) {
                    return showToast('Emniyet Kısıtlaması', 'Fırtına uyarısı süresince vinç hareketleri durdurulmuştur.', 'error');
                }
                if (!canDelete) return showToast('Yetki Sınırı', 'Konteyner kaldırma yetkisi sadece yöneticilere aittir.', 'error');

                const targetContainer = containers.find(c => c.id === id);
                if (window.confirm('Konteyneri silmek istediğinize emin misiniz?')) {
                    setContainers(containers.filter(c => c.id !== id));
                    if (targetContainer) {
                        setInspections(prev => prev.filter(i => i.containerNumber && i.containerNumber.trim().toUpperCase() !== targetContainer.containerNumber.trim().toUpperCase()));
                        addLog(`Konteyner sahadan kaldırıldı: ${targetContainer.containerNumber}`);
                        showToast('Kaldırıldı', `${targetContainer.containerNumber} envanterden ve gümrükten düşüldü.`, 'success');
                    }
                }
            };

            const filtered = containers.filter(c => c.block && (c.containerNumber.toLowerCase().includes(search.toLowerCase()) || c.block.toLowerCase().includes(search.toLowerCase())));

            return (

        // 8. CUSTOMS PAGE
        function CustomsPage({ inspections, setInspections, containers, currentUser, addLog, showToast }) {
            const canApprove = currentUser.role === 'Admin' || currentUser.role === 'Moderator';

            const handleStatusChange = (id, newStatus) => {
                if (!canApprove) return showToast('Yetki Sınırı', 'Gümrük durumlarını sadece yöneticiler veya moderatörler onaylayabilir.', 'error');

                const target = inspections.find(i => i.id === id);
                setInspections(prev => prev.map(insp => insp.id === id ? { ...insp, status: newStatus } : insp));
                if (target) {
                    addLog(`Konteyner gümrük onay durumu güncellendi: ${target.containerNumber} -> ${newStatus}`);
                    showToast('Güncellendi', `${target.containerNumber} yükü gümrük durumu '${newStatus}' yapıldı.`, 'success');
                }
            };

            const handleFieldChange = (id, fieldName, newValue) => {
                if (!canApprove) return;
                setInspections(prev => prev.map(insp => insp.id === id ? { ...insp, [fieldName]: newValue } : insp));
            };

            const handleDeleteInspection = (id) => {
                if (!canApprove) return showToast('Yetki Sınırı', 'Gümrük muayene kaydı silme yetkisine sadece yöneticiler sahiptir.', 'error');
                const target = inspections.find(i => i.id === id);
                if (window.confirm(`${target?.containerNumber} gümrük muayene kaydını silmek istediğinize emin misiniz?`)) {
                    setInspections(prev => prev.filter(i => i.id !== id));
                    if (target) {
                        addLog(`Gümrük muayene kaydı silindi: ${target.containerNumber}`);
                        showToast('Silindi', `${target.containerNumber} gümrük kaydı silindi.`, 'success');
                    }
                }
            };

            return (
                <div className="space-y-6">
                    <div>
                        <h1 className="text-3xl font-extrabold text-white">Gümrük Muayene Takibi</h1>
                        <p className="text-slate-400 text-sm mt-1">Liman giriş ve çıkışlarındaki muayene onay durumları.</p>
                    </div>
                    <div className="bg-[#111827] border border-slate-800 p-6 rounded-2xl">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left text-xs text-slate-400">
                                <thead className="bg-[#1e293b]/30 text-slate-300 uppercase">
                                    <tr>
                                        <th className="px-6 py-4 rounded-l-xl">Konteyner No</th>
                                        <th className="px-6 py-4">Muayene Memuru</th>
                                        <th className="px-6 py-4">Tarih</th>
                                        <th className="px-6 py-4">Durum</th>
                                        <th className="px-6 py-4">Açıklama / Muayene Notu</th>
                                        <th className="px-6 py-4 rounded-r-xl text-center">İşlem</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-800/60">
                                    {inspections.filter(i => i.containerNumber && containers.some(c => c.containerNumber && c.containerNumber.trim().toUpperCase() === i.containerNumber.trim().toUpperCase())).map(insp => (
                                        <tr key={insp.id} className="hover:bg-slate-800/20">
                                            <td className="px-6 py-4 font-mono font-bold text-slate-200">{insp.containerNumber}</td>

                                            <td className="px-6 py-4">
                                                {canApprove ? (
                                                    <input
                                                        type="text"
                                                        value={insp.inspectorName || ''}
                                                        onChange={(e) => handleFieldChange(insp.id, 'inspectorName', e.target.value)}
                                                        className="bg-slate-900 border border-slate-750 text-slate-205 text-xs rounded px-2 py-1 w-36 focus:outline-none"
                                                    />
                                                ) : (
                                                    <span>{insp.inspectorName}</span>
                                                )}
                                            </td>

                                            <td className="px-6 py-4">
                                                {canApprove ? (
                                                    <input
                                                        type="date"
                                                        value={insp.date || ''}
                                                        onChange={(e) => handleFieldChange(insp.id, 'date', e.target.value)}
                                                        className="bg-slate-900 border border-slate-750 text-slate-205 text-xs rounded px-2 py-1 focus:outline-none"
                                                    />
                                                ) : (
                                                    <span>{insp.date}</span>
                                                )}
                                            </td>

                                            <td className="px-6 py-4">
                                                <select
                                                    className={`bg-slate-900 border border-slate-750 text-[10px] rounded px-2 py-1 font-bold ${insp.status === 'Geçti' ? 'text-emerald-400' : insp.status === 'Reddedildi' ? 'text-red-400' : 'text-amber-400'} ${!canApprove ? 'opacity-60 cursor-not-allowed' : ''}`}
                                                    value={insp.status}
                                                    onChange={(e) => handleStatusChange(insp.id, e.target.value)}
                                                    disabled={!canApprove}
                                                >
                                                    <option value="Beklemede" className="text-amber-450 font-semibold">Beklemede</option>
                                                    <option value="Geçti" className="text-emerald-455 font-semibold">Geçti</option>
                                                    <option value="Reddedildi" className="text-red-455 font-semibold">Reddedildi</option>

                                            </td>

                                            <td className="px-6 py-4">
                                                {canApprove ? (
                                                    <input
                                                        type="text"
                                                        value={insp.notes || ''}
                                                        onChange={(e) => handleFieldChange(insp.id, 'notes', e.target.value)}
                                                        className="bg-slate-900 border border-slate-750 text-slate-205 text-xs rounded px-2 py-1 w-full min-w-[200px] focus:outline-none"

        // 9. TRUCKS PAGE
        function TrucksPage({ reservations, setReservations, containers, currentUser, setWorkOrders, addLog, showToast }) {
            const [form, setForm] = useState({ containerId: '', truckLicensePlate: '', driverName: '', scheduledTime: '', direction: 'In', status: 'Pending' });

            const canModify = currentUser.role === 'Admin' || currentUser.role === 'Moderator';

            useEffect(() => {
                fetchReservations();
            }, []);

            const fetchReservations = async () => {
                try {
                    const response = await fetch('/api/Gate');
                    if (response.ok) {
                        const data = await response.json();
                        if (data && data.length > 0) setReservations(data);
                    }
                } catch (e) {
                    console.log("C# API'den tır verileri çekilemedi, offline modda devam ediliyor.");
                }
            };

            const handleAdd = async (e) => {
                e.preventDefault();
                if (!form.truckLicensePlate || !form.driverName || !form.scheduledTime) {
                    return showToast('Form Hatası', 'Lütfen tüm tır giriş kayıt alanlarını doldurun.', 'error');
                }

                const payload = {
                    containerId: parseInt(form.containerId) || 0,
                    truckLicensePlate: form.truckLicensePlate.trim(),
                    driverName: form.driverName.trim(),
                    scheduledTime: new Date(form.scheduledTime).toISOString(),
                    direction: form.direction,
                    status: form.status
                };

                try {
                    const response = await fetch('/api/Gate/reservation', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (response.ok) {
                        const resData = await response.json();
                        const createdRes = resData.reservation || resData;
                        setReservations(prev => [...prev, createdRes]);
                    } else {
                        setReservations(prev => [...prev, { id: Date.now(), ...payload }]);
                    }
                } catch (err) {
                    setReservations(prev => [...prev, { id: Date.now(), ...payload }]);
                }

                addLog(`Tır kapı randevusu oluşturuldu: ${payload.truckLicensePlate} (Yön: ${payload.direction})`);
                showToast('Randevu Alındı', `${payload.truckLicensePlate} plakalı tır için rezervasyon tamamlandı.`, 'success');
                setForm({ containerId: '', truckLicensePlate: '', driverName: '', scheduledTime: '', direction: 'In', status: 'Pending' });
            };

            const handleStatusChange = async (id, newStatus) => {
                if (!canModify) return showToast('Yetki Sınırı', 'Onay süreçleri sadece Admin ve Moderatörler tarafından yönetilir.', 'error');

                const item = reservations.find(r => r.id === id);
                if (!item) return;

                const payload = { ...item, status: newStatus };

                try {
                    let url = `/api/Gate/${id}`;
                    let method = 'PUT';

                    if (newStatus === 'Approved') {
                        url = `/api/Gate/approve/${id}`;
                        method = 'PUT';
                    }

                    const response = await fetch(url, {
                        method: method,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (response.ok) {
                        const resData = await response.json();
                        const updatedRes = resData.reservation || payload;
                        setReservations(prev => prev.map(r => r.id === id ? updatedRes : r));
                    } else {
                        setReservations(prev => prev.map(r => r.id === id ? { ...r, status: newStatus } : r));
                    }
                } catch (err) {
                    setReservations(prev => prev.map(r => r.id === id ? { ...r, status: newStatus } : r));
                }

                if (newStatus === 'Approved' && setWorkOrders) {
                    const targetContainer = containers.find(c => c.id === item.containerId);
                    const newWorkOrder = {
                        id: Date.now() + Math.random(),
                        type: item.direction && item.direction.trim().toUpperCase() === 'IN' ? 'Tır Giriş (Tahliye)' : 'Tır Çıkış (Yükleme)',
                        containerId: item.containerId || 0,
                        containerNo: targetContainer ? targetContainer.containerNumber : 'Bilinmeyen',
                        targetBlock: 'A',
                        targetBay: 1,
                        targetTier: 1,
                        operatorId: 0,
                        operatorName: 'Saha Vinç Görevlisi',
                        status: 'Beklemede',
                        createdBy: currentUser?.username || 'Sistem'
                    };
                    setWorkOrders(prev => [...prev, newWorkOrder]);
                }

                const statusTranslations = {
                    'Pending': 'Beklemede',
                    'Approved': 'Onaylandı',
                    'Completed': 'Tamamlandı',
                    'Cancelled': 'İptal Edildi'
                };
                const trStatus = statusTranslations[newStatus] || newStatus;
                addLog(`Tır kapı randevu durumu güncellendi: ${item.truckLicensePlate} -> ${trStatus}`);
                showToast('Durum Güncellendi', `${item.truckLicensePlate} plakalı tır durumu '${trStatus}' yapıldı.`, 'success');
            };

            const handleDelete = async (id) => {
                if (!canModify) return showToast('Yetki Sınırı', 'Rezervasyon kayıtlarını silme yetkiniz yoktur.', 'error');

                const item = reservations.find(r => r.id === id);
                if (!window.confirm('Randevuyu silmek istediğinize emin misiniz?')) return;

                try {
                    const response = await fetch(`/api/Gate/${id}`, { method: 'DELETE' });
                    if (response.ok) setReservations(prev => prev.filter(r => r.id !== id));
                    else setReservations(prev => prev.filter(r => r.id !== id));
                } catch (err) {
                    setReservations(prev => prev.filter(r => r.id !== id));
                }

                if (item) {
                    addLog(`Tır kapı randevusu silndi: ${item.truckLicensePlate}`);
                    showToast('Silindi', `${item.truckLicensePlate} randevusu iptal edildi.`, 'success');
                }
            };

            const getNormalizedStatus = (status) => {
                if (!status) return 'Pending';
                const s = status.toString().trim().toUpperCase();
                if (s === 'APPROVED' || s === 'ONAYLANDI') return 'Approved';
                if (s === 'COMPLETED' || s === 'TAMAMLANDI') return 'Completed';
                if (s === 'CANCELLED' || s === 'REJECTED' || s === 'IPTAL' || s === 'IPTAL EDILDI') return 'Cancelled';
                return 'Pending';
            };

            return (
                <div className="space-y-6">
                    <div>
                        <h1 className="text-3xl font-extrabold text-white">Tır Giriş-Çıkış Randevuları</h1>
                        <p className="text-slate-400 text-sm mt-1">Limana giriş yapacak veya çıkış yapacak tırların kapı rezervasyonları.</p>
                    </div>
                    <div className="grid grid-cols-1 xl:grid-cols-3 gap-6">
                        <div className="bg-[#111827] border border-slate-800 p-6 rounded-2xl h-fit">
                            <h2 className="text-lg font-bold text-white mb-4">Yeni Tır Randevusu</h2>
                            <form onSubmit={handleAdd} className="space-y-4">
                                <div>
                                    <label className="text-xs text-slate-400 block mb-1">Konteyner</label>
                                    <select className="w-full bg-[#1e293b]/40 border border-slate-750 rounded-xl px-3 py-2.5 text-slate-200 text-xs focus:outline-none text-slate-100 font-semibold" value={form.containerId} onChange={e => setForm({...form, containerId: e.target.value})}>
                                        <option value="">Konteyner Seçin (Opsiyonel)</option>
                                        {containers.map(c => <option key={c.id} value={c.id}>{c.containerNumber} (Blok {c.block})</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="text-xs text-slate-400 block mb-1">Tır Plakası (Maks 10 Karakter)</label>
                                    <input type="text" maxLength="10" placeholder="Örn: 34 ABC 123" className="w-full bg-[#1e293b]/40 border border-slate-700 rounded-xl px-4 py-2.5 text-slate-200 text-sm focus:outline-none" value={form.truckLicensePlate} onChange={e => setForm({...form, truckLicensePlate: e.target.value.toUpperCase().replace(/[^A-Z0-9 ]/g, '')})} />
                                </div>
                                <div>
                                    <label className="text-xs text-slate-400 block mb-1">Şoför Ad Soyad</label>
                                    <input type="text" placeholder="Örn: Ahmet Yurt" className="w-full bg-[#1e293b]/40 border border-slate-700 rounded-xl px-4 py-2.5 text-slate-200 text-sm focus:outline-none" value={form.driverName} onChange={e => setForm({...form, driverName: e.target.value})} />
                                </div>
                                <div className="grid grid-cols-2 gap-4">

        // 12. DND STOWAGE PLANNER COMPONENT
        function StowagePlannerPage({ containers, setContainers, ships, setShips, shipCargo, setShipCargo, inspections, workOrders, setWorkOrders, currentUser, isStormActive, addLog, showToast }) {
            const [selectedShipId, setSelectedShipId] = useState('');
            const [loadingRates, setLoadingRates] = useState([22.4, 24.1, 25.0, 23.6, 26.2, 25.8, 28.3]);

            const SLOTS_SCHEMA = [
                { id: 1, name: "Slot 1 (20ft | Dry & Reefer)", allowedSizes: ["20ft"], allowedCargoTypes: ["Dry", "Reefer"] },
                { id: 2, name: "Slot 2 (20ft | Her Tür Yük)", allowedSizes: ["20ft"], allowedCargoTypes: ["Dry", "Reefer", "Hazardous"] },
                { id: 3, name: "Slot 3 (40ft | Sadece Reefer)", allowedSizes: ["40ft"], allowedCargoTypes: ["Reefer"] },
                { id: 4, name: "Slot 4 (40ft | Normal/Kuru Yük)", allowedSizes: ["40ft"], allowedCargoTypes: ["Dry"] },
                { id: 5, name: "Slot 5 (20ft | Tehlikeli Yasak)", allowedSizes: ["20ft"], allowedCargoTypes: ["Dry", "Reefer"] },
                { id: 6, name: "Slot 6 (40ft | Tehlikeli Yasak)", allowedSizes: ["40ft"], allowedCargoTypes: ["Dry", "Reefer"] }
            ];

            const activeShips = ships.filter(s => s.status === 'Yanaştı');
            const availableContainers = containers.filter(c => c.block && !c.loadedOnShipId);

            const handleDragStart = (e, container) => {
                e.dataTransfer.setData("text/plain", JSON.stringify(container));
            };

            const handleDragOver = (e) => {
                e.preventDefault();
            };

            const handleDrop = (e, slotId) => {
                e.preventDefault();
                if (!selectedShipId) return showToast('Planlama Hatası', 'Lütfen önce yükleme yapılacak rıhtımdaki gemiyi seçin.', 'error');

                const containerData = e.dataTransfer.getData("text/plain");
                if (!containerData) return;

                const container = JSON.parse(containerData);
                const slot = SLOTS_SCHEMA.find(s => s.id === slotId);
                if (!slot) return;

                const inspection = inspections.find(i => i.containerNumber && i.containerNumber.trim().toUpperCase() === container.containerNumber.trim().toUpperCase());
                const customsStatus = inspection ? inspection.status : 'Beklemede';
                if (customsStatus !== 'Geçti') {
                    return showToast(
                        'Gümrük Engeli',
                        `${container.containerNumber} gümrükten onay almamıştır (Gümrük: ${customsStatus}). Muayene onaylanmadan gemiye yüklenemez!`,
                        'error'
                    );
                }

                if (!slot.allowedSizes.includes(container.size)) {
                    return showToast(
                        'Ebat Hatası',
                        `Bu slot yalnızca ${slot.allowedSizes.join(", ")} yük kabul eder. Yüklemek istediğiniz: ${container.size}`,
                        'error'
                    );
                }

                if (!slot.allowedCargoTypes.includes(container.cargoType)) {
                    if (container.cargoType === 'Hazardous') {
                        showToast('Güvenlik Engeli', 'Yangın riski nedeniyle bu slota tehlikeli (Hazardous) madde yüklenmesi yasaktır!', 'error');
                    } else if (container.cargoType === 'Reefer') {
                        showToast('Enerji Bağlantı Hatası', 'Soğutmalı konteynerleri (Reefer) sadece elektrik ünitesi olan slota (Slot 3) yüklemelisiniz.', 'error');
                    } else {
                        showToast('Uyumsuzluk', 'Kargo türü bu yuvaya uygun değildir.', 'error');
                    }
                    return;
                }

                if (shipCargo[selectedShipId] && shipCargo[selectedShipId][slotId]) {
                    return showToast('Yuva Dolu', 'Bu slota zaten bir konteyner yüklenmiş.', 'error');
                }

                setShipCargo(prev => {
                    const currentShip = prev[selectedShipId] || {};
                    return {
                        ...prev,
                        [selectedShipId]: {
                            ...currentShip,
                            [slotId]: container
                        }
                    };
                });

                const shipName = ships.find(s => s.id === parseInt(selectedShipId))?.name;

                setContainers(prev => prev.map(c => {
                    if (c.id === container.id) {
                        const history = c.history || [];
                        const newEvent = {
                            id: Date.now() + Math.random(),
                            timestamp: new Date().toISOString(),
                            action: `Gemiye İstif Yüklemesi: ${shipName} gemisinin ${slot.name} yuvasına yüklendi.`,
                            user: currentUser?.username || 'Sistem'
                        };
                        return { ...c, block: '', bay: 0, tier: 0, loadedOnShipId: parseInt(selectedShipId), history: [...history, newEvent] };
                    }
                    return c;
                }));

                // Gemiye yükleme iş emrini otomatik olarak tamamla
                if (setWorkOrders) {
                    setWorkOrders(prev => prev.map(w => {
                        if (w.containerId === container.id && w.status === 'Beklemede' && w.type.includes('Gemi')) {
                            return { ...w, status: 'Tamamlandı' };
                        }
                        return w;
                    }));
                }

                // Update live crane performance rates
                setLoadingRates(prev => {
                    const next = [...prev];
                    next.shift();
                    next.push(parseFloat((Math.random() * 6 + 25).toFixed(1)));
                    return next;
                });

                addLog(`Konteyner gemiye yüklendi: ${container.containerNumber} -> Gemi: ${shipName} (${slot.name})`);
                showToast('Gemiye Yüklendi', `${container.containerNumber} gemiye başarıyla yüklendi.`, 'success');
            };

            const handleUnload = (slotId) => {
                const container = shipCargo[selectedShipId]?.[slotId];
                if (!container) return;

                const blocks = ['A', 'B', 'C', 'D'];
                const bays = [1, 2, 3, 4, 5, 6];
                let emptyCell = null;

                for (let block of blocks) {
                    for (let bay of bays) {
                        const exists = containers.some(c => c.block === block && c.bay === bay);
                        if (!exists) {
                            emptyCell = { block, bay };
                            break;
                        }
                    }
                    if (emptyCell) break;
                }

                if (!emptyCell) {
                    return showToast('Saha Dolu', 'Liman depolama sahasında boş yer kalmadığı için yük gemiden indirilemez!', 'error');
                }

                setShipCargo(prev => {
                    const currentShip = { ...prev[selectedShipId] };
                    delete currentShip[slotId];
                    return {
                        ...prev,
                        [selectedShipId]: currentShip
                    };
                });

                setContainers(prev => prev.map(c => {
                    if (c.id === container.id) {
                        const history = c.history || [];
                        const newEvent = {
                            id: Date.now() + Math.random(),
                            timestamp: new Date().toISOString(),
                            action: `Gemiden Tahliye: ${shipName} gemisinden tahliye edilip Blok ${emptyCell.block} - Hücre ${emptyCell.bay} konumuna geri alındı.`,
                            user: currentUser?.username || 'Sistem'
                        };
                        return { ...c, block: emptyCell.block, bay: emptyCell.bay, tier: 1, loadedOnShipId: null, history: [...history, newEvent] };
                    }
                    return c;
                }));

                // Update live crane performance rates
                setLoadingRates(prev => {
                    const next = [...prev];
                    next.shift();
                    next.push(parseFloat((Math.random() * 6 + 25).toFixed(1)));
                    return next;
                });

                const shipName = ships.find(s => s.id === parseInt(selectedShipId))?.name;
                addLog(`Konteyner gemiden indirilip sahaya geri alındı: ${container.containerNumber} -> Geri Konum: Blok ${emptyCell.block}-${emptyCell.bay}`);
                showToast('Gemiden İndirildi', `${container.containerNumber} sahadaki boş hücreye (${emptyCell.block}-${emptyCell.bay}) geri alındı.`, 'success');
            };

            // Stabilite Hesaplamaları (Draft, Trim, Meyil)
            let totalWeight = 0;
            let portWeight = 0; // Sol slotlar: 1, 3, 5 (İskele)
            let starboardWeight = 0; // Sağ slotlar: 2, 4, 6 (Sancak)
            let bowWeight = 0; // Ön slotlar: 1, 2 (Baş)
            let sternWeight = 0; // Arka slotlar: 5, 6 (Kıç)

            const getWeight = (cargo) => {
                if (!cargo) return 0;
                let base = cargo.size === '20ft' ? 12 : 22;
                if (cargo.cargoType === 'Reefer') base += 2;
                if (cargo.cargoType === 'Hazardous') base += 3;
                return base;
            };

            if (selectedShipId && shipCargo[selectedShipId]) {
                const cargoMap = shipCargo[selectedShipId];
                Object.keys(cargoMap).forEach(slotId => {
                    const cargo = cargoMap[slotId];
                    if (cargo) {
                        const w = getWeight(cargo);
                        totalWeight += w;
                        const idNum = parseInt(slotId);
                        if ([1, 3, 5].includes(idNum)) portWeight += w;
                        if ([2, 4, 6].includes(idNum)) starboardWeight += w;
                        if ([1, 2].includes(idNum)) bowWeight += w;
                        if ([5, 6].includes(idNum)) sternWeight += w;
                    }
                });
            }

            const draft = parseFloat((2.0 + (totalWeight / 40)).toFixed(2));
            const maxDraft = 5.5;
            const draftPercent = Math.min((draft / maxDraft) * 100, 100);

            const weightDiff = starboardWeight - portWeight;
            const totalSideWeight = starboardWeight + portWeight;
            const listAngle = totalSideWeight > 0 ? parseFloat(((weightDiff / totalSideWeight) * 8).toFixed(1)) : 0;

            const bowSternDiff = sternWeight - bowWeight;
            const totalLengthWeight = sternWeight + bowWeight;
            const trimValue = totalLengthWeight > 0 ? parseFloat(((bowSternDiff / totalLengthWeight) * 1.5).toFixed(2)) : 0;

            const handleDepartShip = async () => {
                if (!selectedShipId) return;

                const shipIdNum = parseInt(selectedShipId);
                const ship = ships.find(s => s.id === shipIdNum);
                if (!ship) return;

                const loadedCount = Object.keys(shipCargo[selectedShipId] || {}).length;
                if (loadedCount === 0) {
                    return showToast(
                        'Kalkış Engeli',
                        'Gemi boş durumda! Yola çıkabilmesi için en az bir konteyner yüklenmelidir.',
                        'error'
                    );

                        'Kalkış Engeli (Aşırı Yük)',

                        'error'
                    );

                        'error'
                    );

                if (trimValue < 0) {

                        'Kalkış Engeli (Başa Trim)',
                        'Gemi başa trimli durumda (baş tarafı aşırı batık). Güvenli kalkış için yükleri geminin arka (kıç) tarafına kaydırın.',
                        'error'
                    );
                }

                try {
                    await fetch(`/api/Vessel/depart/${shipIdNum}`, {
                        method: 'POST'
                    });
                } catch (err) {
                    console.log("C# API çevrimdışı, yerel kalkış simülasyonu çalıştırılıyor.");

                : '0 dk';

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
