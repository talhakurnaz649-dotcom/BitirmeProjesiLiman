        // 12.5. TRUCK STOWAGE PAGE
        function TruckStowagePage({ reservations, setReservations, containers, setContainers, inspections, setInspections, currentUser, isStormActive, setWorkOrders, addLog, showToast }) {
            const [selectedTruckId, setSelectedTruckId] = useState('');
            const [selectedBlock, setSelectedBlock] = useState('A');

            // CCTV Kapı Kamerası Okuma Simülasyonu
            const [scanProgress, setScanProgress] = useState(0);
            const [scanning, setScanning] = useState(false);
            const [printedPass, setPrintedPass] = useState(null);

            useEffect(() => {
                if (selectedTruckId) {
                    setScanning(true);
                    setScanProgress(0);
                    const interval = setInterval(() => {
                        setScanProgress(prev => {
                            if (prev >= 100) {
                                clearInterval(interval);
                                setScanning(false);
                                return 100;
                            }
                            return prev + 10;
                        });
                    }, 100);
                    return () => clearInterval(interval);
                } else {
                    setScanning(false);
                    setScanProgress(0);
                }
            }, [selectedTruckId]);

            const canApprove = currentUser.role === 'Admin' || currentUser.role === 'Moderator';
            const bays = [1, 2, 3, 4, 5, 6];

            useEffect(() => {
                const fetchReservations = async () => {
                    try {
                        const response = await fetch('/api/Gate');
                        if (response.ok) {
                            const data = await response.json();
                            if (data && data.length > 0) setReservations(data);
                        }
                    } catch (e) {
                        console.log("C# API'den tır verileri çekilemedi.");
                    }
                };
                fetchReservations();
            }, []);

            const activeTrucks = reservations.filter(r =>
                r.status && (
                    r.status.trim().toUpperCase() === 'APPROVED' ||
                    r.status.trim().toUpperCase() === 'PENDING'
                )
            );
            const selectedTruck = activeTrucks.find(t => t.id === parseInt(selectedTruckId));
            const truckContainer = selectedTruck ? containers.find(c => c.id === selectedTruck.containerId) : null;

            const getContainerAt = (block, bay) => {
                return containers.find(c => c.block === block && c.bay === bay);
            };

            const handleTruckDragStart = (e) => {
                if (!truckContainer) return;
                e.dataTransfer.setData("text/plain", JSON.stringify({ source: 'truck', containerId: truckContainer.id }));
            };

            const handleYardDragStart = (e, container) => {
                // Gümrük kontrolü
                const inspection = inspections.find(i => i.containerNumber && i.containerNumber.trim().toUpperCase() === container.containerNumber.trim().toUpperCase());
                const customsStatus = inspection ? inspection.status : 'Beklemede';

                if (customsStatus !== 'Geçti') {
                    e.preventDefault();
                    return showToast(
                        'Gümrük Engeli',
                        `${container.containerNumber} gümrükten onay almamıştır (Gümrük: ${customsStatus}). Muayene onaylanmadan limandan çıkış yapamaz!`,
                        'error'
                    );
                }

                e.dataTransfer.setData("text/plain", JSON.stringify({ source: 'yard', containerId: container.id }));
            };

            const handleDragOver = (e) => {
                e.preventDefault();
            };

            const handleYardDrop = async (e, block, bay) => {
                e.preventDefault();
                if (isStormActive) return showToast('Emniyet Engeli', 'Fırtına nedeniyle vinç operasyonları durdurulmuştur.', 'error');

                const rawData = e.dataTransfer.getData("text/plain");
                if (!rawData) return;

                try {
                    const dragInfo = JSON.parse(rawData);
                    if (dragInfo.source !== 'truck') return; // Sadece tırdan sahaya sürüklenebilir

                    if (!selectedTruck || !truckContainer) return;
                    if (selectedTruck.status && selectedTruck.status.trim().toUpperCase() !== 'APPROVED') {
                        return showToast('Geçiş Engeli', 'Tır randevusu onaylanmamıştır! Bariyer kapalı olduğundan yük indirilemez.', 'error');
                    }

                    // Konum dolu mu?
                    const occupied = containers.some(c => c.block === block && c.bay === bay);
                    if (occupied) return showToast('Konum Dolu', `Seçilen ${block}-${bay} hücresinde başka bir yük bulunmaktadır.`, 'error');

                    // Tehlikeli madde ayrımı güvenlik kontrolü
                    if (truckContainer.cargoType === 'Hazardous') {
                        const blockHazardous = containers.filter(c => c.block === block && c.cargoType === 'Hazardous');
                        for (let existing of blockHazardous) {
                            const distance = Math.abs(existing.bay - bay);
                            if (distance < 3) {
                                return showToast(
                                    '⚠️ GÜVENLİK ENGELİ',
                                    `Tehlikeli maddeler arasında en az 3 bay boşluk olmalıdır! En yakın tehlikeli yük: Hücre ${existing.bay} (Mesafe: ${distance})`,
                                    'warning'
                                );
                            }
                        }
                    }

                    // Sahaya yerleştir & Geçmişe ekle
                    setContainers(prev => prev.map(c => {
                        if (c.id === truckContainer.id) {
                            const history = c.history || [];
                            const newEvent = {
                                id: Date.now() + Math.random(),
                                timestamp: new Date().toISOString(),
                                action: `Tır Kapısı Girişi: Plakası ${selectedTruck.truckLicensePlate} olan tır ile limana giriş yaptı ve Blok ${block} - Hücre ${bay} konumuna istiflendi.`,
                                user: currentUser?.username || 'Sistem'
                            };
                            return {
                                ...c,
                                block: block,
                                bay: bay,
                                tier: 1,
                                history: [...history, newEvent]
                            };
                        }
                        return c;
                    }));

                    // Tır statüsünü güncelle
                    setReservations(prev => prev.map(r => r.id === selectedTruck.id ? { ...r, status: 'Completed' } : r));

                    // Tır Girişine bağlı olan İş Emrini otomatik olarak Tamamla
                    if (setWorkOrders) {
                        setWorkOrders(prev => prev.map(w => {
                            if (w.containerId === truckContainer.id && w.status === 'Beklemede' && w.type.includes('Giriş')) {
                                return { ...w, status: 'Tamamlandı' };
                            }
                            return w;
                        }));
                    }

                    // C# API güncelleme
                    try {
                        await fetch(`/api/Gate/${selectedTruck.id}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ ...selectedTruck, status: 'Completed' })
                        });
                    } catch (err) {
                        console.log("C# API güncellenemedi.");
                    }

                    setPrintedPass({
                        timestamp: new Date().toISOString(),
                        plate: selectedTruck.truckLicensePlate,
                        driver: selectedTruck.driverName,
                        containerNo: truckContainer.containerNumber,
                        direction: 'GİRİŞ (Yük Teslim)',
                        position: `Blok ${block} - Hücre ${bay}`,
                        size: truckContainer.size,
                        type: truckContainer.cargoType
                    });

                    addLog(`Tır yükü sürüklenerek sahaya indirildi: ${truckContainer.containerNumber} -> Konum: ${block}-${bay}`);
                    showToast('Saha Girişi Yapıldı', `${truckContainer.containerNumber} konteyneri tırdan indirilerek sahaya yerleştirildi.`, 'success');
                    setSelectedTruckId('');

                } catch (err) {
                    console.error("Drop error", err);
                }
            };

            const handleTruckDrop = async (e) => {
                e.preventDefault();
                if (isStormActive) return showToast('Emniyet Engeli', 'Fırtına nedeniyle vinç operasyonları durdurulmuştur.', 'error');

                const rawData = e.dataTransfer.getData("text/plain");
                if (!rawData) return;

                try {
                    const dragInfo = JSON.parse(rawData);
                    if (dragInfo.source !== 'yard') return; // Sadece sahadan tıra yüklenebilir

                    if (!selectedTruck) return;
                    if (selectedTruck.status && selectedTruck.status.trim().toUpperCase() !== 'APPROVED') {
                        return showToast('Geçiş Engeli', 'Tır randevusu onaylanmamıştır! Bariyer kapalı olduğundan yük yüklenemez.', 'error');
                    }

                    const container = containers.find(c => c.id === dragInfo.containerId);
                    if (!container) return;

                    // Gümrük kontrolü (Güvenlik tedbiri)
                    const inspection = inspections.find(i => i.containerNumber && i.containerNumber.trim().toUpperCase() === container.containerNumber.trim().toUpperCase());
                    const customsStatus = inspection ? inspection.status : 'Beklemede';
                    if (customsStatus !== 'Geçti') {
                        return showToast('Gümrük Engeli', `${container.containerNumber} gümrükten geçmemiştir!`, 'error');
                    }

                    // Sahadan çıkar (Tıra yükle) & Geçmişe ekle
                    setContainers(prev => prev.map(c => {
                        if (c.id === container.id) {
                            const history = c.history || [];
                            const newEvent = {
                                id: Date.now() + Math.random(),
                                timestamp: new Date().toISOString(),
                                action: `Tır Kapısı Çıkışı: Plakası ${selectedTruck.truckLicensePlate} olan tır üzerine yüklenerek limandan sevk edildi.`,
                                user: currentUser?.username || 'Sistem'
                            };
                            return {
                                ...c,
                                block: '',
                                bay: 0,
                                tier: 0,
                                history: [...history, newEvent]
                            };
                        }
                        return c;
                    }));

                    // Tır durumunu Completed yap ve yükle
                    setReservations(prev => prev.map(r => r.id === selectedTruck.id ? { ...r, containerId: container.id, status: 'Completed' } : r));

                    // Tır Çıkışına bağlı olan İş Emrini otomatik olarak Tamamla
                    if (setWorkOrders) {
                        setWorkOrders(prev => prev.map(w => {
                            if (w.containerId === container.id && w.status === 'Beklemede' && w.type.includes('Çıkış')) {
                                return { ...w, status: 'Tamamlandı' };
                            }
                            return w;
                        }));
                    }

                    // C# API güncelleme
                    try {
                        await fetch(`/api/Gate/${selectedTruck.id}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ ...selectedTruck, containerId: container.id, status: 'Completed' })
                        });
                    } catch (err) {
                        console.log("C# API güncellenemedi.");
                    }

                    setPrintedPass({
                        timestamp: new Date().toISOString(),
                        plate: selectedTruck.truckLicensePlate,
                        driver: selectedTruck.driverName,
                        containerNo: container.containerNumber,
                        direction: 'ÇIKIŞ (Yük Çıkış)',
                        position: 'Tır Üzerinde Sevk Edildi',
                        size: container.size,
                        type: container.cargoType
                    });

                    addLog(`Konteyner sürüklenerek tıra yüklendi ve sevk edildi: ${container.containerNumber} -> Tır: ${selectedTruck.truckLicensePlate}`);
                    showToast('Liman Çıkışı Başarılı', `${container.containerNumber} konteyneri tıra yüklenerek sevk edildi.`, 'success');
                    setSelectedTruckId('');

                } catch (err) {
                    console.error("Drop error", err);
                }
            };

            return (
                <div className="space-y-6">
                    <div>
                        <h1 className="text-3xl font-extrabold text-white flex items-center gap-2">
                            <span className="text-amber-500"><Icons.Truck /></span>
                            Tır Yükleme & Kapı Simülatörü
                        </h1>
                        <p className="text-slate-400 text-sm mt-1">Giriş/çıkış yapan tırlar ile saha konumları arasında sürükle-bırak yükleme operasyonu.</p>
                    </div>

                    <div className="bg-[#111827] border border-slate-800 p-4 rounded-2xl flex items-center space-x-4">
                        <label className="text-xs text-slate-400 font-semibold uppercase">Aktif Kapı Rezervasyonu:</label>
                        <select
                            className="bg-slate-900 border border-slate-750 text-xs rounded-xl px-4 py-2 focus:outline-none text-slate-100 font-semibold"
                            value={selectedTruckId}
                            onChange={e => { setSelectedTruckId(e.target.value); }}
                        >
                            <option value="">Tır Randevusu Seçin</option>
                            {activeTrucks.map(t => (
                                <option key={t.id} value={t.id}>
                                    {t.truckLicensePlate} - {t.driverName} ({t.direction && t.direction.trim().toUpperCase() === 'IN' ? 'Giriş / In' : 'Çıkış / Out'})
                                </option>
                            ))}
                        </select>
                    </div>

                    {selectedTruck ? (
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            {/* SOL TARAF: TIR KASASI / CHASSIS */}
                            <div className="bg-[#111827] border border-slate-800 rounded-3xl p-6 flex flex-col items-center justify-between min-h-[460px] relative overflow-hidden">
                                <h3 className="text-sm font-bold text-slate-300 self-start mb-4">Kapı Güvenlik Noktası (Gate Control)</h3>

                                {/* CCTV Kapı Kamerası Okuma Simülasyonu */}
                                <div className="w-full bg-slate-950 border border-slate-850 rounded-2xl p-3.5 font-mono text-[10px] text-emerald-450 relative overflow-hidden mb-4 shadow-inner select-none">
                                    {/* CRT Tarama ve Izgara Efektleri */}
                                    <div className="absolute inset-0 bg-gradient-to-b from-transparent via-emerald-500/5 to-transparent pointer-events-none opacity-30 animate-pulse" />
                                    <div className="absolute inset-0 bg-[linear-gradient(rgba(18,16,16,0)_50%,_rgba(0,0,0,0.25)_50%),_linear-gradient(90deg,_rgba(255,0,0,0.06),_rgba(0,255,0,0.02),_rgba(0,0,255,0.06))] bg-[size:100%_3px,_3px_100%] pointer-events-none" />

                                    <div className="flex justify-between items-center border-b border-emerald-900/30 pb-2 mb-2.5 text-[9px] text-emerald-500 font-bold">
                                        <span className="flex items-center gap-1.5">
                                            <span className="w-1.5 h-1.5 bg-red-500 rounded-full animate-ping" />
                                            <span>CAM-01 GATE A | CANLI</span>
                                        </span>
                                        <span>{new Date().toISOString().split('T')[0]}</span>
                                    </div>

                                    <div className="relative h-20 bg-slate-900 rounded-xl border border-emerald-950/60 flex flex-col justify-center px-4 overflow-hidden shadow-inner">
                                        {scanning ? (
                                            <div className="space-y-1.5 text-center">
                                                <span className="text-amber-400 font-bold block animate-pulse tracking-wide">PLAKA OKUNUYOR...</span>
                                                <div className="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden mt-1">
                                                    <div className="bg-amber-500 h-full transition-all duration-100" style={{ width: `${scanProgress}%` }} />
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="space-y-1.5">
                                                <div className="flex justify-between">
                                                    <span className="text-emerald-600 font-bold">PLAKA:</span>
                                                    <span className="text-slate-100 font-extrabold tracking-wider">{selectedTruck.truckLicensePlate}</span>
                                                </div>
                                                <div className="flex justify-between">
                                                    <span className="text-emerald-600 font-bold">SÜRÜCÜ:</span>
                                                    <span className="text-slate-100 font-bold">{selectedTruck.driverName}</span>
                                                </div>
                                                <div className="flex justify-between items-center">
                                                    <span className="text-emerald-600 font-bold">BARİYER DURUMU:</span>
                                                    <span className={`px-2 py-0.5 rounded text-[9px] font-extrabold uppercase ${selectedTruck.status && selectedTruck.status.trim().toUpperCase() === 'APPROVED' ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : 'bg-red-500/10 text-red-400 border border-red-500/20'}`}>
                                                        {selectedTruck.status && selectedTruck.status.trim().toUpperCase() === 'APPROVED' ? 'GEÇİŞ SERBEST (AÇIK)' : 'GEÇİŞ YASAK (KAPALI)'}
                                                    </span>
                                                </div>
                                            </div>
                                        )}

                                        {/* Laser Tarama Çizgisi */}
                                        {scanning && (
                                            <div className="absolute left-0 right-0 h-0.5 bg-amber-500/80 shadow-[0_0_8px_#f59e0b] animate-bounce top-0" style={{ animationDuration: '1.2s' }} />
                                        )}
                                    </div>

                                    <div className="flex items-center justify-between mt-2.5 pt-2 border-t border-emerald-900/30">
                                        <div className="flex items-center space-x-2">
                                            <span className="text-emerald-600 font-semibold text-[9px]">GİRİŞ SİNYALİ:</span>
                                            <span className={`w-3.5 h-3.5 rounded-full border border-black/50 shadow-inner transition-all duration-300 ${scanning ? 'bg-amber-500 animate-pulse shadow-[0_0_8px_#f59e0b]' : (selectedTruck.status && selectedTruck.status.trim().toUpperCase() === 'APPROVED') ? 'bg-emerald-500 shadow-[0_0_8px_#10b981]' : 'bg-red-500 shadow-[0_0_8px_#ef4444]'}`} />
                                        </div>
                                        <div className="flex items-center space-x-1.5 text-[9px]">
                                            <span className="text-emerald-600 font-bold">REZERVASYON:</span>
                                            <span className={`font-bold ${selectedTruck.status && selectedTruck.status.trim().toUpperCase() === 'APPROVED' ? 'text-emerald-400' : 'text-amber-500'}`}>
                                                {selectedTruck.status === 'Approved' ? 'Onaylandı' :
                                                 selectedTruck.status === 'Pending' ? 'Beklemede' :
                                                 selectedTruck.status === 'Completed' ? 'Tamamlandı' :
                                                 selectedTruck.status === 'Cancelled' ? 'İptal Edildi' : selectedTruck.status}
                                            </span>
                                        </div>
                                    </div>
                                </div>

                                <div className="w-full max-w-sm flex flex-col items-center space-y-4 my-auto">
                                    {selectedTruck.direction && selectedTruck.direction.trim().toUpperCase() === 'IN' ? (
                                        // GİRİŞ YAPAN TIR: Üzerindeki konteyner sürüklenebilir
                                        <div
                                            draggable={!!truckContainer}
                                            onDragStart={handleTruckDragStart}
                                            className={`w-64 h-24 relative rounded-xl border flex flex-col items-center justify-center transition-all duration-300 shadow-lg cursor-grab active:cursor-grabbing ${
                                                truckContainer ?
                                                    truckContainer.cargoType === 'Hazardous' ? 'bg-red-500/10 border-red-500/30 text-red-400' :
                                                    truckContainer.cargoType === 'Reefer' ? 'bg-cyan-500/10 border-cyan-500/30 text-cyan-400' :
                                                    'bg-blue-600/10 border-blue-500/20 text-blue-400'
                                                : 'bg-slate-950/40 border-slate-800'
                                            }`}
                                        >
                                            <span className="text-[9px] text-slate-500 absolute top-2 left-3">Yükü Sahaya Sürükleyin</span>
                                            {truckContainer ? (
                                                <div className="text-center space-y-1.5 p-4 w-full h-full flex flex-col justify-center rounded-xl">
                                                    <span className="text-xs font-mono font-bold text-white">{truckContainer.containerNumber}</span>
                                                    <span className="text-[9px] bg-slate-800 text-slate-300 px-2 py-0.5 rounded-full font-bold uppercase self-center">{truckContainer.size} | {truckContainer.cargoType}</span>
                                                </div>
                                            ) : (
                                                <span className="text-xs text-red-400 font-semibold">Tırda konteyner bulunamadı!</span>
                                            )}
                                        </div>
                                    ) : (
                                        // ÇIKIŞ YAPAN TIR: Üzerine sahadan konteyner bırakılabilir (Drop Zone)
                                        <div
                                            onDragOver={handleDragOver}
                                            onDrop={handleTruckDrop}
                                            className="w-64 h-24 relative rounded-xl border border-dashed flex flex-col items-center justify-center transition-all duration-300 shadow-lg bg-slate-950/20 border-slate-700 hover:border-emerald-500/40"
                                        >
                                            <span className="text-[9px] text-slate-500 absolute top-2 left-3">Kasa Boş (Yük Sürükleyin)</span>
                                            <div className="text-center p-4">
                                                <span className="text-xs text-slate-500 italic">Sahadan onaylı yükü buraya bırakın</span>
                                            </div>
                                        </div>
                                    )}

                                    {/* Tır Görseli (Truck Vector) */}
                                    <svg className="w-72 h-16 text-slate-400" viewBox="0 0 300 60" fill="currentColor">
                                        <path d="M 230 40 L 265 40 L 265 15 L 255 10 L 245 10 L 245 25 L 230 25 Z" fill="#1e293b" stroke="#334155" strokeWidth="2" />
                                        <rect x="250" y="15" width="10" height="8" rx="1" fill="#94a3b8" />
                                        <rect x="20" y="38" width="220" height="6" fill="#475569" />
                                        <circle cx="50" cy="48" r="10" fill="#0f172a" stroke="#475569" strokeWidth="2" />
                                        <circle cx="50" cy="48" r="4" fill="#64748b" />
                                        <circle cx="75" cy="48" r="10" fill="#0f172a" stroke="#475569" strokeWidth="2" />
                                        <circle cx="75" cy="48" r="4" fill="#64748b" />
                                        <circle cx="185" cy="48" r="10" fill="#0f172a" stroke="#475569" strokeWidth="2" />
                                        <circle cx="185" cy="48" r="4" fill="#64748b" />
                                        <circle cx="210" cy="48" r="10" fill="#0f172a" stroke="#475569" strokeWidth="2" />
                                        <circle cx="210" cy="48" r="4" fill="#64748b" />
                                    </svg>
                                </div>

                                <div className="text-center text-xs space-y-1 mt-6">
                                    <p className="font-extrabold text-white">{selectedTruck.truckLicensePlate}</p>
                                    <p className="text-[10px] text-slate-500">Şoför: {selectedTruck.driverName} | Yön: {selectedTruck.direction && selectedTruck.direction.trim().toUpperCase() === 'IN' ? 'Giriş (In)' : 'Çıkış (Out)'}</p>
                                </div>
                            </div>

                            {/* SAĞ TARAF: SAHA SEÇİMİ VE YÜKLEME/İNDİRME (YARD DOCK LAYOUT) */}
                            <div className="lg:col-span-2 bg-[#111827] border border-slate-800 rounded-3xl p-6 flex flex-col">
                                <div className="flex justify-between items-center mb-6">
                                    <div>
                                        <h3 className="text-sm font-bold text-white">Liman Saha Alanı (Yard Layout)</h3>
                                        <p className="text-[10px] text-slate-400 mt-0.5">Sahadaki hücreleri kullanarak sürükleme operasyonlarını gerçekleştirin.</p>
                                    </div>
                                    <div className="flex space-x-1.5 bg-slate-900 p-1 rounded-xl border border-slate-800 text-[10px] font-bold">
                                        {['A', 'B', 'C', 'D'].map(b => (
                                            <button
                                                key={b}
                                                onClick={() => setSelectedBlock(b)}
                                                className={`px-3 py-1.5 rounded-lg transition ${selectedBlock === b ? 'bg-blue-600 text-white' : 'text-slate-400 hover:text-slate-205'}`}
                                            >
                                                Blok {b}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 md:grid-cols-3 gap-4 flex-1">
                                    {bays.map(bay => {
                                        const container = getContainerAt(selectedBlock, bay);
                                        return (
                                            <div
                                                key={bay}
                                                onDragOver={handleDragOver}
                                                onDrop={(e) => handleYardDrop(e, selectedBlock, bay)}
                                                className={`aspect-video rounded-2xl border p-3 flex flex-col items-center justify-center transition-all relative ${
                                                    container ?
                                                        container.cargoType === 'Hazardous' ? 'bg-red-500/10 border-red-500/30 text-red-400' :
                                                        container.cargoType === 'Reefer' ? 'bg-cyan-500/10 border-cyan-500/30 text-cyan-400' :
                                                        'bg-emerald-500/10 border-emerald-500/30 text-emerald-400'
                                                    : 'border-dashed border-slate-800 bg-slate-955/20 text-slate-600 hover:border-blue-500/30 hover:bg-slate-955/40'
                                                }`}
                                            >
                                                <span className="text-[9px] text-slate-500 absolute top-2 left-3">Hücre {selectedBlock}{bay}</span>

                                                {container ? (
                                                    // SAHADAKİ DOLU HÜCRE: Çıkış yapan tır için sürüklenebilir
                                                    <div
                                                        draggable={selectedTruck.direction && selectedTruck.direction.trim().toUpperCase() === 'OUT'}
                                                        onDragStart={(e) => handleYardDragStart(e, container)}
                                                        className={`text-center space-y-1.5 w-full h-full flex flex-col justify-center rounded-xl ${selectedTruck.direction && selectedTruck.direction.trim().toUpperCase() === 'OUT' ? 'cursor-grab active:cursor-grabbing' : ''}`}
                                                    >
                                                        <span className="text-xs font-mono font-bold text-white block">{container.containerNumber}</span>
                                                        <span className="text-[9px] bg-slate-800 text-slate-300 px-1.5 py-0.5 rounded-full font-bold uppercase self-center">{container.size} | {container.cargoType}</span>
                                                    </div>
                                                ) : (
                                                    <span className="text-[10px] text-slate-600 italic">Boş Hücre</span>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    ) : (
                        <div className="bg-[#111827] border border-slate-800 rounded-3xl p-12 text-center text-xs italic text-slate-500">
                            İşlem yapmak için lütfen yukarıdaki menüden kapıda bekleyen aktif bir tır randevusu seçin.
                        </div>
                    )}

                    {printedPass && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 print:p-0">
                            <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 w-full max-w-sm flex flex-col justify-between shadow-2xl relative print:border-none print:bg-white print:p-0 print:w-full print:max-w-none print:shadow-none">
                                {/* Print Close Button */}

                if (target) {
                    addLog(`@${target.username} adlı kullanıcının rolü ${newRole} olarak güncellendi.`);
                    showToast('Rol Güncellendi', `@${target.username} çalışan rolü '${newRole}' yapıldı.`, 'success');

        // 15. CHATBOT WIDGET
        function ChatbotWidget({ containers = [], ships = [], reservations = [], inspections = [] }) {
            const [open, setOpen] = useState(false);
            const [input, setInput] = useState('');
            const [messages, setMessages] = useState([
                { sender: 'bot', text: 'Merhaba! Liman AI yardımcınız burada. Gemi hareketleri, gümrük veya saha doluluğu hakkında bilgi alabilirsiniz.' }
            ]);

            const parseMarkdown = (text) => {
                if (!window.marked) return text;
                try {
                    if (typeof window.marked.parse === 'function') {
                        return window.marked.parse(text);
                    }
                    if (typeof window.marked === 'function') {
                        return window.marked(text);
                    }
                } catch (e) {
                    console.error("Markdown parse error:", e);
                }
                return text;
            };

            const generateLocalResponse = (query) => {
                const q = query.toLowerCase().trim();

                // 1. Storage Yard Status
                if (q.includes('boş') || q.includes('saha') || q.includes('doluluk') || q.includes('yer') || q.includes('kapasite')) {
                    const totalSlots = 24;
                    const occupied = containers.filter(c => c.block && c.bay).length;
                    const free = totalSlots - occupied;
                    const pct = ((occupied / totalSlots) * 100).toFixed(1);

                    let resp = "### Saha Doluluk Raporu 📊\n";
                    resp += "- **Toplam Kapasite:** " + totalSlots + " Konteyner Yuvası\n";
                    resp += "- **Dolu Yuva Sayısı:** " + occupied + " adet (%" + pct + " doluluk)\n";
                    resp += "- **Boş Yuva Sayısı:** " + free + " adet\n\n";

                    const emptyCoords = [];
                    ['A', 'B', 'C', 'D'].forEach(block => {
                        for (let bay = 1; bay <= 6; bay++) {
                            const isOccupied = containers.some(c => c.block === block && c.bay === bay);
                            if (!isOccupied) emptyCoords.push(block + bay);
                        }
                    });

                    resp += "**Boş Hücre Adresleri:** " + emptyCoords.join(', ');
                    return resp;
                }

                // 2. Ships Status
                if (q.includes('gemi') || q.includes('rıhtım') || q.includes('isabella') || q.includes(' ')) {
                    let resp = "### Rıhtımdaki Aktif Gemiler 🚢\n";
                    const activeShips = ships.filter(s => s.status === 'Berth' || s.status === 'Anchor');
                    if (activeShips.length === 0) {
                        return "Liman rıhtımında veya demirleme sahasında aktif gemi bulunmamaktadır.";
                    }
                    activeShips.forEach(s => {
                        const statusText = s.status === 'Berth' ? 'Rıhtımda (Yanaşmış)' : 'Demirleme Sahasında (Bekliyor)';
                        resp += "- **" + s.name + "** (" + s.type + ") - Durum: `" + statusText + "`\n";
                        const loadedCount = containers.filter(c => c.loadedOnShipId === s.id).length;

                    });

                // 3. Truck Status
                if (q.includes('tır') || q.includes('plaka') || q.includes('şoför') || q.includes('bariyer') || q.includes('randevu') || q.includes('geçiş')) {
                    let resp = "### Kapı Rezervasyon Durumu 🚛\n";
                    const activeTrucks = reservations.filter(r => r.status !== 'Completed');
                    if (activeTrucks.length === 0) {
                        return "Şu anda kapıda bekleyen aktif tır randevusu bulunmuyor.";
                    }
                    resp += "Liman kapısında toplam **" + activeTrucks.length + "** aktif tır randevusu var:\n";
                    activeTrucks.forEach(t => {
                        const dirText = t.direction && t.direction.trim().toUpperCase() === 'IN' ? 'Giriş (Yard In)' : 'Çıkış (Yard Out)';
                        const statusTranslations = {
                            'Pending': 'Beklemede',
                            'Approved': 'Onaylandı',
                            'Completed': 'Tamamlandı',
                            'Cancelled': 'İptal Edildi'
                        };
                        const trStatus = statusTranslations[t.status] || t.status;
                        resp += "- **" + t.truckLicensePlate + "** (" + t.driverName + ") | Yön: `" + dirText + "` | Durum: *" + trStatus + "*\n";
                    });
                    return resp;
                }

                // 4. Customs Status
                if (q.includes('gümrük') || q.includes('red') || q.includes('geçti') || q.includes('onay')) {
                    let resp = "### Gümrük Muayene ve Denetim Raporu 🛃\n";
                    const passed = inspections.filter(i => i.status === 'Geçti').length;
                    const rejected = inspections.filter(i => i.status === 'Reddedildi').length;
                    const pending = inspections.filter(i => i.status === 'Beklemede').length;

                    resp += "- **Gümrükten Geçen (Onaylı):** " + passed + " Konteyner\n";
                    resp += "- **Reddedilen Yükler (Karantina):** " + rejected + " Konteyner\n";
                    resp += "- **Denetim Bekleyen:** " + pending + " Konteyner\n\n";

                    if (rejected > 0) {
                        resp += "**Kırmızı Listeye Alınan Konteynerler:**\n";
                        inspections.filter(i => i.status === 'Reddedildi').forEach(i => {
                            resp += "- `" + i.containerNumber + "` (Nedeni: " + (i.description || 'Evrak eksikliği') + ")\n";
                        });
                    }
                    return resp;
                }

                // 5. Help Menu
                let helpText = "### Liman AI Yardımcısı 🤖 (Çevrimdışı Mod)\n\n";
                helpText += "C# Backend sunucunuza bağlanılamadı, bu yüzden yerel veri tabanını kullanarak size yanıt veriyorum.\n\n";
                helpText += "**Bana aşağıdaki konuları sorabilirsiniz:**\n";
                helpText += "- **\"doluluk\"** veya **\"boş konumlar\"** (Depolama sahası durumunu sorgular)\n";
                helpText += "- **\"gemiler\"** veya **\"rıhtım\"** (Gemi yükleme durumlarını listeler)\n";
                helpText += "- **\"tırlar\"** veya **\"kapı\"** (Bekleyen tırların listesi)\n";
                helpText += "- **\"gümrük\"** veya **\"reddedilenler\"** (Gümrükten geçmeyen konteynerler)\n\n";
                helpText += "*Örn: \"rıhtımdaki gemiler hangileri?\" ya da \"boş yer var mı?\"*";
                return helpText;
            };

            const handleSend = async (e) => {
                e.preventDefault();
                if (!input.trim()) return;

                const userMessage = input;
                setMessages(prev => [...prev, { sender: 'user', text: userMessage }]);
                setInput('');

                setMessages(prev => [...prev, { sender: 'bot', text: 'Düşünüyor...' }]);

                try {
                    const response = await fetch('/api/AI/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: userMessage })
                    });

                    if (response.ok) {
                        const rawText = await response.text();
                        let replyText = "";
                        try {
                            const data = JSON.parse(rawText);
                            replyText = data.answer || data.Answer || data.response || data.Response || data.message || data.Message || JSON.stringify(data);
                        } catch (jsonErr) {
                            replyText = rawText;
                        }

                        setMessages(prev => {
                            const filtered = prev.filter(m => m.text !== 'Düşünüyor...');
                            return [...filtered, { sender: 'bot', text: replyText || 'Yapay zekadan boş yanıt döndü.' }];
                        });
                    } else {
                        throw new Error("Server response not ok");
                    }
                } catch (err) {
                    console.log("C# AI API çevrimdışı, yerel soru-cevap motoru devreye giriyor.");
                    const localReply = generateLocalResponse(userMessage);
                    setMessages(prev => {
                        const filtered = prev.filter(m => m.text !== 'Düşünüyor...');
                        return [...filtered, { sender: 'bot', text: localReply }];

            return (

                                            {m.sender === 'bot' && m.text !== 'Düşünüyor...' ? (
                                                <div className="chat-markdown" dangerouslySetInnerHTML={{ __html: parseMarkdown(m.text) }} />
                                            ) : m.text}
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <form onSubmit={handleSend} className="p-3 border-t border-slate-800 bg-[#0d1527] flex gap-2">

        function LoginOnpage({ onLogin, users, setUsers, showToast }) {
            const [isRegister, setIsRegister] = useState(false);
            const [name, setName] = useState('');
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!username.trim() || !password.trim()) {
                    showToast('Eksik Bilgi', 'Lütfen kullanıcı adı ve şifre alanlarını doldurun.', 'warning');
                    return;
                }

                if (isRegister) {
                    if (!name.trim()) {
                        showToast('Eksik Bilgi', 'Lütfen adınızı ve soyadınızı girin.', 'warning');
                        return;
                    }
                    const exists = users.some(u => u.username.toLowerCase() === username.toLowerCase().trim());
                    if (exists) {
                        showToast('Kayıt Engeli', 'Bu kullanıcı adı sistemde zaten kayıtlı.', 'error');
                        return;
                    }

                    const newUser = {
                        id: Date.now(),
                        name: name.trim(),
                        username: username.trim().toLowerCase(),
                        password: password.trim(),
                        role: 'Operator'
                    };
                    setUsers([...users, newUser]);
                    showToast('Kayıt Başarılı', 'Giriş yapabilirsiniz. Admin onay verene kadar rolünüz Operatör olacaktır.', 'success');
                    setIsRegister(false);
                } else {
                    const foundUser = users.find(u => u.username.toLowerCase() === username.toLowerCase().trim() && u.password === password.trim());
                    if (foundUser) {
                        onLogin(foundUser);
                    } else {
                        showToast('Giriş Hatası', 'Hatalı kullanıcı adı veya şifre girdiniz.', 'error');
                    }
                }
            };

            return (

                                        placeholder="Adınız ve Soyadınız"

                                        onChange={e => setName(e.target.value)}
                                    />
                                </div>

                                <div className="relative">
                                    <input
                                        type="text"
                                        placeholder="Kullanıcı adı"
                                        className="w-full bg-[#1e293b]/45 border border-slate-705 rounded-xl pl-10 pr-4 py-2.5 text-slate-205 text-sm focus:outline-none"
                                        value={username}
                                        onChange={e => setUsername(e.target.value)}

                            <div>

                                        type="password"
                                        placeholder="Şifre"

                                        value={password}
                                        onChange={e => setPassword(e.target.value)}
                                    />

                                </div>
                            </div>

                                className="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition duration-200 shadow-lg shadow-blue-500/20 mt-6"

                        </div>
                    </div>
                </div>
            );

                        date: new Date().toISOString().split('T')[0],
                        status: 'Beklemede',
                        notes: 'Sistem tarafından otomatik gümrük denetimine yönlendirildi.'
                    }));
                    setInspections(prev => [...prev, ...newInspections]);
                }
            }, [containers, inspections]);

            const handleLogout = () => {
                setCurrentUser(null);
                setCurrentPage('dashboard');
            };

            const handleHardReset = () => {
                if (window.confirm("Liman otomasyonundaki tüm verileri sıfırlayıp fabrika ayarlarına dönmek istediğinize emin misiniz?")) {
                    localStorage.clear();
                    window.location.reload();
                }
            };

            if (!currentUser) {
                return (
                    <LoginOnpage
                        onLogin={(user) => {
                            setCurrentUser(user);
                            showToast('Giriş Başarılı', `Tekrar hoş geldiniz, ${user.name}`, 'success');
                        }}
                        users={users}
                        setUsers={setUsers}
                        showToast={showToast}
                    />
                );
            }

            return (
                <div className="flex h-screen bg-dark-bg text-slate-100 overflow-hidden print:bg-white print:text-black">
                    {/* Toast Bildirimleri Yerleşimi */}
                    <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[9999] flex flex-col space-y-2 pointer-events-none w-full max-w-sm px-4">
                        {toasts.map(t => (
                            <div
                                key={t.id}
                                className={`toast-animate p-4 rounded-2xl border backdrop-blur-md shadow-2xl flex items-start space-x-3 pointer-events-auto transition-all ${
                                    t.type === 'success' ? 'bg-emerald-950/80 border-emerald-500/30 text-emerald-200' :
                                    t.type === 'error' ? 'bg-red-950/80 border-red-500/30 text-red-200' :
                                    'bg-amber-950/80 border-amber-500/30 text-amber-200'
                                }`}
                            >
                                <span className="text-base mt-0.5">
                                    {t.type === 'success' ? '✅' : t.type === 'error' ? '❌' : '⚠️'}
                                </span>
                                <div className="flex-1">
                                    <h4 className="font-bold text-xs text-white">{t.title}</h4>
                                    <p className="text-[10px] mt-0.5 opacity-90 leading-relaxed">{t.message}</p>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Sidebar */}
                    <aside className="w-64 bg-[#0d1527] border-r border-slate-800 flex flex-col h-screen text-slate-300 print:hidden">
                        <div className="p-6 border-b border-slate-800 flex flex-col space-y-1">
                            <div className="flex items-center space-x-3">
                                <div className="text-blue-500 animate-pulse"><Icons.Anchor /></div>
                                <span className="text-xl font-bold bg-gradient-to-r from-blue-400 to-cyan-400 bg-clip-text text-transparent font-extrabold font-mono">
                                    PortMaster
                                </span>
                            </div>
                            <span className="text-[9px] text-slate-500 font-mono tracking-wider font-semibold">v2.5 - Tır Yük Planlama Aktif</span>
                        </div>

                        <div className="px-6 py-4 border-b border-slate-850 bg-slate-900/20">
                            <p className="text-[10px] text-slate-500 font-semibold uppercase tracking-wider">Giriş Yapan</p>
                            <p className="text-xs font-bold text-slate-200 mt-0.5">{currentUser.name}</p>
                            <span className={`inline-block text-[9px] font-bold px-2 py-0.5 rounded-full mt-1.5 uppercase tracking-wider ${
                                currentUser.role === 'Admin' ? 'bg-red-500/10 text-red-400 border border-red-500/20' :
                                currentUser.role === 'Moderator' ? 'bg-amber-500/10 text-amber-400 border border-amber-500/20' :
                                'bg-blue-500/10 text-blue-400 border border-blue-500/20'
                            }`}>
                                {currentUser.role}
                            </span>
                        </div>

                        <nav className="flex-1 p-4 space-y-1 overflow-y-auto">
                            <button onClick={() => setCurrentPage('dashboard')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-300 ${currentPage === 'dashboard' ? 'bg-blue-600/20 text-blue-400 border border-blue-500/30 font-medium' : 'hover:bg-slate-800/50 hover:text-slate-100 border border-transparent'}`}>
                                <Icons.Dashboard /><span>Gösterge Paneli</span>
                            </button>

                            {(currentUser.role === 'Admin' || currentUser.role === 'Moderator') && (
                                <button onClick={() => setCurrentPage('ships_mng')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-300 ${currentPage === 'ships_mng' ? 'bg-blue-600/20 text-blue-400 border border-blue-500/30 font-medium' : 'hover:bg-slate-800/50 hover:text-slate-100 border border-transparent'}`}>
                                    <Icons.Ship /><span>Gemi Kayıt / Giriş</span>
                                </button>
                            )}

                            <button onClick={() => setCurrentPage('containers')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-300 ${currentPage === 'containers' ? 'bg-blue-600/20 text-blue-400 border border-blue-500/30 font-medium' : 'hover:bg-slate-800/50 hover:text-slate-100 border border-transparent'}`}>
                                <Icons.Database /><span>Konteyner Yönetimi</span>
                            </button>

                            {(currentUser.role === 'Admin' || currentUser.role === 'Moderator') && (
                                <button onClick={() => setCurrentPage('customs')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-300 ${currentPage === 'customs' ? 'bg-blue-600/20 text-blue-400 border border-blue-500/30 font-medium' : 'hover:bg-slate-800/50 hover:text-slate-100 border border-transparent'}`}>
                                    <Icons.ShieldAlert /><span>Gümrük Muayene</span>
                                </button>
                            )}

                            {(currentUser.role === 'Admin' || currentUser.role === 'Moderator') && (
                                <button onClick={() => setCurrentPage('trucks')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-300 ${currentPage === 'trucks' ? 'bg-blue-600/20 text-blue-400 border border-blue-500/30 font-medium' : 'hover:bg-slate-800/50 hover:text-slate-100 border border-transparent'}`}>
                                    <Icons.Truck /><span>Tır Giriş-Çıkış</span>
                                </button>
                            )}

                            <button onClick={() => setCurrentPage('stowage_planner')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-300 ${currentPage === 'stowage_planner' ? 'bg-blue-600/20 text-blue-400 border border-blue-500/30 font-medium' : 'hover:bg-slate-800/50 hover:text-slate-100 border border-transparent'}`}>
                                <Icons.Layers /><span>Gemi Yük Planlama</span>
                            </button>
                            <button onClick={() => setCurrentPage('truck_stowage')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-300 ${currentPage === 'truck_stowage' ? 'bg-blue-600/20 text-blue-400 border border-blue-500/30 font-medium' : 'hover:bg-slate-800/50 hover:text-slate-100 border border-transparent'}`}>
                                <Icons.Truck /><span>Tır Yük Simülatörü</span>
                            </button>
                            <button onClick={() => setCurrentPage('work_orders')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-300 ${currentPage === 'work_orders' ? 'bg-blue-600/20 text-blue-400 border border-blue-500/30 font-medium' : 'hover:bg-slate-800/50 hover:text-slate-100 border border-transparent'}`}>
                                <Icons.Tasks /><span>İş Emirleri</span>
                            </button>

                            {currentUser.role === 'Admin' && (
                                <button onClick={() => setCurrentPage('finances')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-300 ${currentPage === 'finances' ? 'bg-emerald-600/20 text-emerald-400 border border-emerald-500/30 font-medium' : 'hover:bg-slate-800/50 hover:text-slate-100 border border-transparent'}`}>
                                    <Icons.Finance /><span>Finansal Raporlar</span>
                                </button>
                            )}

                            {(currentUser.role === 'Admin' || currentUser.role === 'Moderator') && (
                                <button onClick={() => setCurrentPage('logs')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-300 ${currentPage === 'logs' ? 'bg-[#3b82f6]/20 text-[#60a5fa] border border-[#3b82f6]/30 font-medium' : 'hover:bg-slate-800/50 hover:text-slate-100 border border-transparent'}`}>
                                    <Icons.History /><span>Sistem Günlüğü</span>
                                </button>
                            )}

                            {currentUser.role === 'Admin' && (
                                <button onClick={() => setCurrentPage('users')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-300 ${currentPage === 'users' ? 'bg-red-600/20 text-red-400 border border-red-500/30 font-medium' : 'hover:bg-slate-800/50 hover:text-slate-100 border border-transparent'}`}>
                                    <Icons.Users /><span>Kullanıcı Yetkilendirme</span>
                                </button>
                            )}
                        </nav>

                        <div className="p-4 border-t border-slate-800 space-y-1">
                            <button onClick={handleHardReset} className="w-full flex items-center space-x-3 px-4 py-2 text-xs rounded-xl hover:bg-amber-500/10 hover:text-amber-400 border border-transparent hover:border-amber-500/20 transition-all duration-300 text-slate-500 font-semibold" title="Tüm saha verilerini sıfırlar">
                                🔄 <span>Tüm Verileri Sıfırla</span>
                            </button>
                            <button onClick={handleLogout} className="w-full flex items-center space-x-3 px-4 py-3 rounded-xl hover:bg-red-500/10 hover:text-red-400 border border-transparent hover:border-red-500/20 transition-all duration-300 text-slate-400">
                                <Icons.LogOut /><span>Çıkış Yap</span>
                            </button>
                        </div>
                    </aside>

                    {/* Sağ Taraf - Ana İçerik */}
                    <div className="flex-1 flex flex-col min-w-0 overflow-y-auto">
                        {windSpeed > 30 && (
                            <div className="bg-red-900/90 text-red-200 border-b border-red-800 px-6 py-3 flex items-center justify-between text-xs font-bold animate-pulse print:hidden">
                                <div className="flex items-center space-x-2">
                                    <span>⚠️</span>
                                    <span>EMNİYET ALARMI: Rüzgar hızı {windSpeed} Knot seviyesindedir. Sahadaki vinçler ve yük taşıma operasyonları geçici olarak durdurulmuştur!</span>
                                </div>
                                <span className="bg-red-700 text-white px-2 py-0.5 rounded text-[10px] uppercase font-mono">Kilitli</span>
                            </div>
                        )}

                        <main className="p-6 md:p-8 flex-1">
                            {currentPage === 'dashboard' && <DashboardPage containers={containers} movements={ships} truckReservations={truckReservations} windSpeed={windSpeed} isStormActive={isStormActive} setIsStormActive={setIsStormActive} currentUser={currentUser} logs={logs} />}
                            {currentPage === 'ships_mng' && <ShipsPage ships={ships} setShips={setShips} containers={containers} currentUser={currentUser} addLog={addLog} showToast={showToast} />}
                            {currentPage === 'containers' && <ContainersPage containers={containers} setContainers={setContainers} inspections={inspections} setInspections={setInspections} ships={ships} currentUser={currentUser} isStormActive={isStormActive} addLog={addLog} showToast={showToast} />}
                            {currentPage === 'customs' && <CustomsPage inspections={inspections} setInspections={setInspections} containers={containers} currentUser={currentUser} addLog={addLog} showToast={showToast} />}
                            {currentPage === 'trucks' && <TrucksPage reservations={truckReservations} setReservations={setTruckReservations} containers={containers} currentUser={currentUser} setWorkOrders={setWorkOrders} addLog={addLog} showToast={showToast} />}
                            {currentPage === 'stowage_planner' && <StowagePlannerPage containers={containers} setContainers={setContainers} ships={ships} setShips={setShips} shipCargo={shipCargo} setShipCargo={setShipCargo} inspections={inspections} workOrders={workOrders} setWorkOrders={setWorkOrders} currentUser={currentUser} isStormActive={isStormActive} addLog={addLog} showToast={showToast} />}
                            {currentPage === 'truck_stowage' && <TruckStowagePage reservations={truckReservations} setReservations={setTruckReservations} containers={containers} setContainers={setContainers} inspections={inspections} setInspections={setInspections} currentUser={currentUser} isStormActive={isStormActive} setWorkOrders={setWorkOrders} addLog={addLog} showToast={showToast} />}
                            {currentPage === 'work_orders' && <WorkOrdersPage workOrders={workOrders} setWorkOrders={setWorkOrders} containers={containers} setContainers={setContainers} users={users} currentUser={currentUser} isStormActive={isStormActive} addLog={addLog} showToast={showToast} />}
                            {currentPage === 'finances' && currentUser.role === 'Admin' && <FinancesPage containers={containers} movements={ships} truckReservations={truckReservations} />}
                            {currentPage === 'logs' && (currentUser.role === 'Admin' || currentUser.role === 'Moderator') && <LogsPage logs={logs} />}
                            {currentPage === 'users' && currentUser.role === 'Admin' && <UsersPage users={users} setUsers={setUsers} addLog={addLog} showToast={showToast} />}
                        </main>
                    </div>

                    {selectedContainer && (
                        <ContainerDetailModal
                            container={selectedContainer}
                            onClose={() => setSelectedContainer(null)}
                            ships={ships}
                            inspections={inspections}
                            workOrders={workOrders}
                        />
                    )}

                    {currentUser && currentUser.role === 'Admin' && <ChatbotWidget />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>
        );
    </script>
</body>
</html>
